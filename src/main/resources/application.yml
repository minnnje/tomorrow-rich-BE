spring:
  application:
    name: tomorrow-rich

  datasource:
    url: jdbc:h2:mem:tomorrowrich
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  sql:
    init:
      mode: always

jwt:
  secret: tomorrow-rich-secret-key-tomorrow-rich-secret-key
  access-token-expiration: 3600000
